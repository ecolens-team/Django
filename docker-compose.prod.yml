services:
  db:
    image: postgres:15
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}

  web:
    build: .
    restart: always
    entrypoint: ["/app/entrypoint.sh"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
    volumes:
      - model_data:/app/observations/6
      - model_data_v2:/app/observations/epoch_1
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - db

volumes:
  postgres_data:
  model_data:
  model_data_v2:
  hf_cache:
