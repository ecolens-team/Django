name: Backend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ecolens_db
          POSTGRES_USER: ecolens_user
          POSTGRES_PASSWORD: ecolens_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check . --exclude venv

      - name: Security check with bandit
        run: bandit -r . -x venv -ll

      - name: Run tests
        env:
          DEBUG: 'True'
          SECRET_KEY: 'ci-test-secret-key'
          DB_NAME: ecolens_db
          DB_USER: ecolens_user
          DB_PASSWORD: ecolens_pass
          DB_HOST: localhost
          DB_PORT: '5432'
        # exit code 5 = no tests collected, treat as pass until tests are written
        run: pytest --ignore=venv || [ $? -eq 5 ]

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /opt/ecolens
            git pull origin main
            docker compose build web
            docker compose up -d --no-deps web
