services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=ecolens_db
      - POSTGRES_USER=ecolens_user
      - POSTGRES_PASSWORD=ecolens_pass
    ports:
      - "5432:5432"
  redis:
    image: redis:alpine
    restart: always

  
  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 EcoLens.asgi:application    
     
    volumes:
      - .:/app
      - hf_cache:/root/.cache/huggingface

    ports:
      - "8000:8000"
    environment:
    - DEBUG=True
    - SECRET_KEY=dev-secret-key-not-for-production
    - DB_NAME=ecolens_db
    - DB_USER=ecolens_user
    - DB_PASSWORD=ecolens_pass
    - DB_HOST=db
    - DB_PORT=5432
    - REDIS_HOST=redis
    - REDIS_PORT=6379
    - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,https://gp2-frontend.vercel.app
    - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
    depends_on:
      - db
      - redis 
volumes:
  postgres_data:
  hf_cache: